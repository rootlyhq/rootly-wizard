# NOTE: this file MUST stay named publish.yml — npm's trusted-publisher (OIDC)
# config for @rootly/wizard pins this workflow filename. Renaming it breaks
# `npm publish` auth (ENEEDAUTH). Update the npm setting before renaming.
name: Publish

# Publish ONLY when a version tag is pushed — never on merges to main. To cut a
# release: bump package.json on a branch, merge the PR, then tag the merge
# commit and push the tag, e.g. `git tag v0.2.11 && git push origin v0.2.11`.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      # Guard against a tag/package.json mismatch — npm publishes whatever
      # package.json says, so the tag must agree or we'd ship the wrong version.
      - name: Verify tag matches package.json
        env:
          TAG: ${{ github.ref_name }}
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "${TAG}" != "${PKG_VERSION}" ]; then
            echo "Tag ${TAG} does not match package.json ${PKG_VERSION}"
            exit 1
          fi
      # keytar dlopens libsecret at runtime; install it on the runner.
      - name: Install libsecret
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-0
      # NOTE: do NOT `npm install -g npm@latest` here — the newest npm fails to
      # produce keytar's native binary during `npm ci` (build/Release/keytar.node
      # missing). Node 24's bundled npm builds it fine (matches the green CI job)
      # and is new enough for OIDC trusted publishing + --provenance.
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test
      - name: Publish to npm
        run: npm publish --provenance --access public
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release create "${TAG}" --generate-notes --title "${TAG}"
