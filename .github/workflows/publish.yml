name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      # keytar needs libsecret; install the -dev package (headers + runtime lib) so
      # the native module can compile from source if needed.
      - run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev
      - run: npm install -g npm@latest
      - run: npm ci
      # npm@latest can skip keytar's prebuilt-binary download during `npm ci`, so
      # its build/Release/keytar.node ends up missing. Force the native build.
      - run: npm rebuild keytar
      - run: npm test
      - run: npm publish --provenance --access public
